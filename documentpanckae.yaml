        tags:
          - Page's Contents
        description: >
          This endpoint allows uploading a file (e.g., image, video) to a Page.<br>
          The request must include a valid `page_access_token` in the query string.<br>


          Video size limit:<br>
            `Shopee`: maximum 30MB<br>
            `Whatsapp Official`: maximum 16MB<br>
            `Lazada`: maximum 100MB<br>
            `Other`: maximum 15MB

        security:
          - PageAccessToken: []
        servers:
          - url: 'https://pages.fm/api/public_api/v1'
            description: Page's API v1
        parameters:
          - name: page_id
            in: path
            required: true
            description: ID of the Page to upload the content to.
            schema:
              type: string
          - name: page_access_token
            in: query
            required: true
            description: Page Access Token obtained from **Settings → Tools**.
            schema:
              type: string
        requestBody:
          required: true
          content:
            multipart/form-data:
              schema:
                type: object
                properties:
                  file:
                    type: string
                    format: binary
                    description: The file to upload.
        responses:
          '200':
            description: Successful upload
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    id:
                      type: string
                      example: HXrxioWFIc5DFwffhmOVHspLuMwpWCXfWDoBxiov6DLa3MvakLeGpLQAly7oHDvZT66VEhnYG4zQEi2MhEzhlg
                    attachment_type:
                      description: Supported attachment types (PHOTO, VIDEO, DOCUMENT, AUDIO_ATTACHMENT_ID).
                      type: string
                      example: 'PHOTO'
                    success:
                      type: boolean
                      example: true
#Chat-plugin
  /pke_chat_plugin/messages:
    post:
      tags:
        - Chat Plugin
      servers:
        - url: 'https://pages.fm/api/v1'
      summary: Send message or create a new conversation
      description: |
        Send a message or create a new conversation to a customer through Pancake Chat Plugin.
        Supports text messages and attachments (e.g. images).
      parameters:
        - name: page_id
          in: query
          required: true
          description: Page ID of the chat plugin
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - from_id
                - dummy_id
                - inserted_at
              properties:
                message:
                  type: string
                  description: Text message content
                  example: Hello! How can I help you?
                dummy_id:
                  type: number
                  description: Client-side unique ID for tracking the message
                  example: 1765875902892
                extra_info:
                  type: object
                  description: Additional metadata
                  example: {}
                name:
                  type: string
                  description: Sender display name
                  example: Web_1619912441
                conversation_id:
                  type: string
                  description: Conversation ID. To create a new conversation you need set conversation_id is `null` 
                  example: web_1664524051101747_web_xxxxxxxxx
                from_id:
                  type: string
                  description: Sender ID
                  example: web_xxxxxxxxx
                replied_message_id:
                  type: string
                  nullable: true
                  description: ID of the message being replied to
                  example: null
                inserted_at:
                  type: number
                  description: Client timestamp in milliseconds
                  example: 1765875902892
                attachments:
                  type: array
                  description: List of attachments
                  items:
                    type: object
                    required:
                      - id
                      - name
                      - url
                      - type
                      - mime_type
                    properties:
                      id:
                        type: string
                        example: 1231231312_acac
                      name:
                        type: string
                        example: anh.png
                      url:
                        type: string
                        format: uri
                        example: https://cdn-icons-png.flaticon.com/512/9584/9584876.png
                      type:
                        type: string
                        description: Attachment type
                        example: photo
                      mime_type:
                        type: string
                        example: image/png
                      size:
                        type: number
                        description: File size in bytes
                        example: 33254
                      width:
                        type: number
                        description: Image width
                        example: 512
                      height:
                        type: number
                        description: Image height
                        example: 512
      responses:
        "200":
          description: Message sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Message ID
                    example: web_1664524051101747_xxxxxxxxx
                  success:
                    type: boolean
                    example: true
                  conversation_id:
                    type: string
                    example: web_1664524051101747_web_xxxxxxxxx
                  from_id:
                    type: string
                    example: web_xxxxxxxxx
                  dummy_id:
                    type: number
                    example: 1765875902892  

    get:
      tags:
        - Chat Plugin
      servers:
        - url: 'https://pages.fm/api/v1'
      summary: Get messages of a conversation
      description: |
        Retrieve message history of a specific conversation in Pancake Chat Plugin.
        Supports pagination via offset.
      parameters:
        - name: conversation_id
          in: query
          required: true
          description: Conversation ID to fetch messages
          schema:
            type: string
            example: web_1664524051101747_web_xxxxxxxxx
        - name: page_id
          in: query
          required: true
          description: Page ID of the chat plugin
          schema:
            type: string
            example: web_1664524051101747
        - name: offset
          in: query
          required: false
          description: Offset for pagination
          schema:
            type: integer
            example: 0
      responses:
        "200":
          description: Messages retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    description: List of messages in the conversation
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: web_1664524051101747_xxxxxxxxx
                        message:
                          type: string
                          description: Message content (HTML format)
                          example: "<div>Hello</div>"
                        original_message:
                          type: string
                          description: Plain text message content
                          example: Hello
                        type:
                          type: string
                          description: Message type
                          example: INBOX
                        seen:
                          type: boolean
                          example: true
                        show_info:
                          type: boolean
                          example: true
                        from:
                          type: object
                          description: Sender information
                          properties:
                            id:
                              type: string
                              example: web_1664524051101747
                            name:
                              type: string
                              example: Pancake Team
                            admin_id:
                              type: string
                              nullable: true
                              example: web_1664524051101747
                            admin_name:
                              type: string
                              nullable: true
                              example: BotcakeAI
                        inserted_at:
                          type: string
                          format: date-time
                          example: "2025-12-13T04:59:23.856000"
                        page_id:
                          type: string
                          example: web_1664524051101747
                        conversation_id:
                          type: string
                          example: web_1664524051101747_web_xxxxxxxxx
                        attachments:
                          type: array
                          description: Attachments associated with the message
                          items:
                            type: object
                            properties:
                              type:
                                type: string
                                example: link
                              title:
                                type: string
                                example: Phụ kiện thời trang 07 | Webcake
                              description:
                                type: string
                                example: Phụ kiện thời trang 07 | Webcake
                              link:
                                type: string
                                format: uri
                                example: https://netfull.online/
                              image:
                                type: object
                                properties:
                                  url:
                                    type: string
                                    format: uri
                                    example: https://content.pancake.vn/xxx.png
                              is_web_source:
                                type: boolean
                                example: true
                        has_phone:
                          type: boolean
                          example: false
                        is_removed:
                          type: boolean
                          example: false
                        is_hidden:
                          type: boolean
                          example: false
                        message_tags:
                          type: array
                          items:
                            type: string
                        user_likes:
                          type: boolean
                          example: false
                  can_request_feedback:
                    type: boolean
                    description: Indicates whether feedback can be requested
                    example: true
components:
  securitySchemes:
    UserAccessToken:
      type: apiKey
      name: access_token
      in: query
      description: >
        User Access Token uniquely identifies an individual user.

        You can find this token in Pancake under: **Account → Personal Settings**.

        This token is valid for up to 90 days or until the user logs out.
        
        ![How to get User access token?](https://statics.pancake.vn/pancake-docs/2025/3/20/Screenshot%202025-03-20%20at%2014.20.51.png)

    PageAccessToken:
      type: apiKey
      name: page_access_token
      in: query
      description: >
        Page Access Token used to authenticate public APIs on behalf of a Page.

        The page's administer can retrieve this token from the Pancake interface by going to:
        **Settings → Tools** or call the Generate page_access_token API.

        This token does not expire unless it is manually deleted or renewed.

        ![How to get Page access token?](https://statics.pancake.vn/pancake-docs/2025/3/20/Screenshot%202025-03-20%20at%2014.30.53.png)

  schemas:
    Page:
      type: object
      properties:
        id:
          type: string
        platform:
          type: string
        name:
          type: string
        avatar_url:
          type: string
          format: uri

    Conversation:
      type: object
      description: A single conversation (inbox thread, comment thread, or livestream thread) on a page.
      properties:
        id:
          type: string
          description: "Unique ID of the conversation. For comments it has the form `{post_fbid}_{comment_fbid}`; for inbox threads it is the customer's PSID."
        type:
          type: string
          enum: [INBOX, COMMENT, LIVESTREAM]
          description: "Conversation channel. `INBOX` = private message thread, `COMMENT` = comment under a post, `LIVESTREAM` = comment during a livestream."
        page_id:
          type: string
          description: ID of the page that owns this conversation.
        post_id:
          type: string
          nullable: true
          description: "ID of the post the conversation belongs to (only for `COMMENT`/`LIVESTREAM` types). `null` for inbox threads."
        snippet:
          type: string
          nullable: true
          description: Short text preview of the most recent message in the conversation. May be `null` when the last message has no text (e.g. an image-only message).
        seen:
          type: boolean
          description: Whether the conversation has been marked as read.
        message_count:
          type: integer
          description: Total number of messages exchanged in the conversation.
        has_phone:
          type: boolean
          description: Whether a phone number has been detected/collected from the customer in this conversation.
        inserted_at:
          type: string
          format: date-time
          description: Timestamp when the conversation was first created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp of the latest activity (e.g. a new message) in the conversation.
        from:
          type: object
          description: The party that started or owns the thread (usually the customer; for a page-initiated thread it is the page).
          properties:
            id:
              type: string
              description: Facebook ID / PSID of the sender.
            name:
              type: string
              description: Display name of the sender.
            email:
              type: string
              nullable: true
              description: Email address of the sender, if known.
        last_sent_by:
          type: object
          description: Information about whoever sent the most recent message in the conversation.
          properties:
            id:
              type: string
              description: Facebook ID / PSID of the last sender.
            name:
              type: string
              description: Display name of the last sender.
            email:
              type: string
              nullable: true
              description: Email of the last sender, if available.
            uid:
              type: string
              nullable: true
              description: Pancake user UUID of the last sender when the message was sent by a staff member.
            admin_id:
              type: string
              nullable: true
              description: ID of the admin/staff account that sent the message (for page-side replies).
            admin_name:
              type: string
              nullable: true
              description: Name of the admin/staff account that sent the message.
            platform:
              type: string
              nullable: true
              description: Platform the message was sent from.
            ai_generated:
              type: boolean
              description: Whether the last message was generated by AI.
            is_automated:
              type: boolean
              description: Whether the last message was sent automatically (e.g. by an automation/bot rule).
        tags:
          type: array
          description: Tags currently attached to the conversation. Entries may be `null` for tags that have been removed/deactivated.
          items:
            type: object
            nullable: true
            properties:
              id:
                type: integer
                description: Unique ID of the tag.
              text:
                type: string
                description: Display label of the tag.
              color:
                type: string
                description: Tag color in hex (e.g. `#f28809`).
              is_deactive:
                type: boolean
                description: Whether the tag has been deactivated.
              is_lead_event:
                type: boolean
                description: Whether the tag is configured as a lead/conversion event.
        tag_histories:
          type: array
          description: Chronological log of tag changes on the conversation.
          items:
            type: object
            properties:
              inserted_at:
                type: string
                format: date-time
                description: When the tag change occurred.
              conversation_id:
                type: string
                description: ID of the conversation the change applies to.
              payload:
                type: object
                description: Details of the tag change.
                properties:
                  action:
                    type: string
                    description: "Type of change (e.g. `add`, `remove`, `clone`)."
                  editor_id:
                    type: string
                    description: ID of the user who made the change (empty when performed by the system).
                  editor_name:
                    type: string
                    description: Name of the user who made the change.
                  tag:
                    type: object
                    properties:
                      id:
                        type: integer
                        nullable: true
                        description: ID of the affected tag.
                      text:
                        type: string
                        description: Label of the affected tag.
        assignee_ids:
          type: array
          description: List of Pancake user UUIDs currently assigned to handle the conversation.
          items:
            type: string
        assignee_group_id:
          type: string
          nullable: true
          description: ID of the staff group the conversation is assigned to, if any.
        current_assign_users:
          type: array
          description: Full details of the staff members currently assigned to the conversation.
          items:
            type: object
            properties:
              id:
                type: string
                description: Pancake user UUID of the assignee.
              name:
                type: string
                description: Display name of the assignee.
              email:
                type: string
                nullable: true
                description: Email of the assignee.
              fb_id:
                type: string
                nullable: true
                description: Facebook ID of the assignee, if linked.
        assignee_histories:
          type: array
          description: Chronological log of assignment changes on the conversation.
          items:
            type: object
            properties:
              inserted_at:
                type: string
                format: date-time
                description: When the assignment change occurred.
              conversation_id:
                type: string
                description: ID of the conversation the change applies to.
              payload:
                type: object
                description: Users added to or removed from the assignment in this change.
                properties:
                  added_users:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssignUser'
                  deleted_users:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssignUser'
        customer_id:
          type: string
          description: Global customer ID linking this conversation's contact across the page's customer database.
        customers:
          type: array
          description: Customers participating in the conversation.
          items:
            type: object
            properties:
              id:
                type: string
                description: Page-customer ID.
              fb_id:
                type: string
                description: Facebook ID / PSID of the customer.
              name:
                type: string
                description: Display name of the customer.
        recent_phone_numbers:
          type: array
          description: Phone numbers recently collected from the customer, with the related order (if any).
          items:
            type: object
            properties:
              phone_number:
                type: string
                description: The collected phone number.
              order_id:
                type: integer
                description: ID of the order the phone number is associated with.
        ad_ids:
          type: array
          nullable: true
          description: IDs of the ads that drove this conversation (for ad-originated conversations). `null` when not from an ad.
          items:
            type: string
        ads:
          type: array
          nullable: true
          description: Details of the ads that drove this conversation. `null` when not from an ad.
          items:
            type: object
        page_customer:
          type: object
          description: Extended profile of the customer as stored in the page's customer database.
          properties:
            id:
              type: string
              description: Page-customer ID.
            name:
              type: string
              description: Customer's display name.
            customer_id:
              type: string
              description: Global customer ID (matches the conversation's `customer_id`).
            psid:
              type: string
              description: Page-scoped ID (PSID) of the customer.
            # global_id:
            #   type: string
            #   nullable: true
            #   description: Customer's global Facebook ID.
            gender:
              type: string
              nullable: true
              description: Customer's gender, if known.
            inserted_at:
              type: string
              format: date-time
              description: When the customer was first added to the page.
            birthday:
              type: object
              nullable: true
              description: Customer's birthday. Components are `0` when unknown.
              properties:
                date:
                  type: integer
                  description: Day of month.
                month:
                  type: integer
                  description: Month (1–12).
                year:
                  type: integer
                  description: Year.
            notes:
              type: array
              nullable: true
              description: Internal notes saved about the customer.
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: Unique ID of the note.
                  message:
                    type: string
                    nullable: true
                    description: Text content of the note.
                  is_pinned:
                    type: boolean
                    description: Whether the note is pinned.
                  created_at:
                    type: integer
                    format: int64
                    description: Creation time as a Unix timestamp in milliseconds.
                  updated_at:
                    type: integer
                    format: int64
                    nullable: true
                    description: Last-updated time as a Unix timestamp in milliseconds.
                  removed_at:
                    type: integer
                    format: int64
                    nullable: true
                    description: Removal time as a Unix timestamp in milliseconds, if the note was deleted.
                  created_by:
                    type: object
                    description: Staff member who created the note.
                    properties:
                      uid:
                        type: string
                        description: Pancake user UUID.
                      fb_id:
                        type: string
                        description: Facebook ID of the author.
                      fb_name:
                        type: string
                        description: Facebook name of the author.
                  images:
                    type: array
                    description: Images attached to the note.
                    items:
                      type: object
                  links:
                    type: array
                    description: Links attached to the note.
                    items:
                      type: object
                  edit_history:
                    type: array
                    description: Prior versions of the note.
                    items:
                      type: object
            recent_orders:
              type: array
              nullable: true
              description: Customer's most recent orders.
              items:
                type: object

    AssignUser:
      type: object
      description: A staff member referenced in an assignment change.
      properties:
        id:
          type: string
          description: Pancake user UUID.
        name:
          type: string
          description: Display name of the user.
        email:
          type: string
          nullable: true
          description: Email of the user.
        fb_id:
          type: string
          nullable: true
          description: Facebook ID of the user, if linked.
    MessagesResponse:
      type: object
      description: >
        Response of the Get messages endpoint. Besides the `messages` array it also returns a rich
        snapshot of the customer and conversation context (customer profile, notes, recent orders,
        captured phone numbers, post activities, etc.) so the full thread can be rendered in one call.
      properties:
        success:
          type: boolean
          description: Whether the request succeeded.
        conversation_id:
          type: string
          description: ID of the conversation the messages belong to.
        messages:
          type: array
          description: The messages in the conversation, ordered from newest to oldest.
          items:
            $ref: '#/components/schemas/Message'
        conv_from:
          type: object
          description: The customer (or party) that owns the conversation.
          properties:
            id:
              type: string
              description: Facebook ID / PSID of the customer.
            name:
              type: string
              description: Display name of the customer.
            email:
              type: string
              nullable: true
              description: Email address of the customer, if known.
        customers:
          type: array
          description: Detailed profiles of the customers in the conversation (orders, addresses, tags, sources, etc.).
          items:
            $ref: '#/components/schemas/MessageCustomer'
        conv_customers:
          type: array
          description: Lightweight reference to each customer in the conversation.
          items:
            type: object
            properties:
              id:
                type: string
                description: Page-customer ID.
              fb_id:
                type: string
                description: Facebook ID / PSID of the customer.
              name:
                type: string
                description: Display name of the customer.
        # global_id:
        #   type: string
        #   nullable: true
        #   description: Customer's global Facebook ID.
        gender:
          type: string
          nullable: true
          description: Customer's gender, if known.
        birthday:
          type: object
          nullable: true
          description: Customer's birthday. Components are `0` when unknown.
          properties:
            date:
              type: integer
              description: Day of month.
            month:
              type: integer
              description: Month (1–12).
            year:
              type: integer
              description: Year.
        lives_in:
          type: string
          nullable: true
          description: Where the customer lives, if known.
        profile_updated_at:
          type: string
          format: date-time
          nullable: true
          description: When the customer's profile was last updated.
        can_inbox:
          type: boolean
          description: Whether the page can currently send the customer an inbox message (inside the messaging window).
        is_banned:
          type: boolean
          description: Whether the customer is banned on the page.
        banned_by:
          type: string
          nullable: true
          description: ID of the user who banned the customer, if banned.
        banned_count:
          type: integer
          description: Number of times the customer has been banned.
        reported_count:
          type: integer
          description: Number of times the customer has been reported.
        allow_use_data_for_training_ai:
          type: boolean
          description: Whether the customer's data may be used to train AI.
        app:
          type: string
          description: Internal identifier of the app/platform the conversation belongs to.
        comment_count:
          type: integer
          description: Total number of comments by the customer on the page.
        last_commented_at:
          type: string
          format: date-time
          nullable: true
          description: When the customer last commented.
        recent_emails:
          type: array
          description: Email addresses recently collected from the customer.
          items:
            type: string
        recent_phone_numbers:
          type: array
          description: Phone numbers recently collected from the customer.
          items:
            type: string
        conv_phone_numbers:
          type: array
          description: Phone numbers detected within this conversation.
          items:
            type: string
        available_for_report_phone_numbers:
          type: array
          description: Phone numbers eligible for delivery-report lookups.
          items:
            type: string
        conv_recent_phone_numbers:
          type: array
          description: Phone numbers captured from messages, with where they were found.
          items:
            type: object
            properties:
              phone_number:
                type: string
                description: Normalised phone number.
              captured:
                type: string
                description: Raw text the number was extracted from.
              m_id:
                type: string
                description: ID of the message the number was captured from.
              offset:
                type: integer
                description: Character offset of the number within the message.
              length:
                type: integer
                description: Length of the captured number.
              status:
                type: integer
                description: Capture status code.
        reports_by_phone:
          type: object
          description: Per-phone-number delivery report counters, keyed by phone number.
          additionalProperties:
            type: object
            properties:
              order_success:
                type: integer
                description: Number of successfully delivered orders.
              order_fail:
                type: integer
                description: Number of failed orders.
              warning:
                type: integer
                description: Number of warnings.
        read_watermarks:
          type: array
          description: Read markers indicating up to which point each participant has read the conversation.
          items:
            type: object
            properties:
              psid:
                type: string
                description: PSID of the participant.
              message_id:
                type: string
                description: ID of the last message read by the participant.
              watermark:
                type: integer
                format: int64
                description: Unix timestamp of the read watermark.
              is_group_conv:
                type: boolean
                nullable: true
                description: Whether this is a group conversation.
        notes:
          type: array
          description: Internal notes saved about the customer.
          items:
            type: object
            properties:
              id:
                type: string
                description: Unique ID of the note.
              message:
                type: string
                nullable: true
                description: Text content of the note.
              order_id:
                type: string
                nullable: true
                description: ID of the order the note is linked to, if any.
              created_at:
                type: integer
                format: int64
                description: Creation time as a Unix timestamp in milliseconds.
              updated_at:
                type: integer
                format: int64
                nullable: true
                description: Last-updated time as a Unix timestamp in milliseconds.
              removed_at:
                type: integer
                format: int64
                nullable: true
                description: Removal time as a Unix timestamp in milliseconds, if deleted.
              created_by:
                type: object
                description: Staff member who created the note.
                properties:
                  uid:
                    type: string
                    description: Pancake user UUID.
                  fb_id:
                    type: string
                    nullable: true
                    description: Facebook ID of the author.
                  fb_name:
                    type: string
                    description: Name of the author.
              images:
                type: array
                description: Images attached to the note.
                items:
                  type: object
              links:
                type: array
                description: Links attached to the note.
                items:
                  type: object
              edit_history:
                type: array
                description: Prior versions of the note.
                items:
                  type: object
        recent_orders:
          type: array
          description: Customer's most recent orders.
          items:
            type: object
        activities:
          type: array
          description: Recent post activities (comments/reactions) by the customer on the page.
          items:
            type: object
            properties:
              source:
                type: string
                description: "Origin of the activity (e.g. `POST`)."
              post_id:
                type: string
                description: ID of the post the activity relates to.
              message:
                type: string
                nullable: true
                description: Text content of the activity.
              inserted_at:
                type: string
                format: date-time
                description: When the activity occurred.
              attachments:
                type: object
                description: Media attached to the activity.
        post:
          type: object
          nullable: true
          description: The post the conversation is attached to (for comment threads). `null` for inbox threads.
        ad_clicks:
          type: object
          description: Ad-click attribution per customer, keyed by customer ID.
        matched_wa_fb_customers:
          type: object
          nullable: true
          description: WhatsApp–Facebook customer matches, when applicable.
        suggested_products:
          type: object
          description: Products suggested for the conversation.
        suggested_posts:
          type: object
          description: Posts suggested for the conversation.
        extra_info:
          type: object
          description: Additional computed information about the conversation.
          properties:
            sentiment_analysis:
              type: object
              description: AI sentiment analysis of the customer's recent messages.
              properties:
                analysis_timestamp:
                  type: string
                  format: date-time
                  description: When the analysis was run.
                last_analyzed_message_id:
                  type: string
                  description: ID of the most recent message included in the analysis.
                last_sentiment:
                  $ref: '#/components/schemas/Sentiment'
                previous_sentiment:
                  $ref: '#/components/schemas/Sentiment'

    Sentiment:
      type: object
      description: A single sentiment-analysis result.
      properties:
        emotion:
          type: string
          description: "Detected emotion (e.g. `neutral`, `positive`, `negative`)."
        intensity:
          type: string
          description: "Strength of the emotion (e.g. `low`, `medium`, `high`)."
        confidence:
          type: number
          format: float
          description: Model confidence from 0 to 1.
        reasoning:
          type: string
          description: Short explanation of why this sentiment was assigned.

    MessageCustomer:
      type: object
      description: Detailed customer profile returned alongside a conversation's messages.
      properties:
        id:
          type: string
          description: Page-customer ID.
        customer_id:
          type: string
          description: Global customer ID.
        fb_id:
          type: string
          description: Facebook ID / PSID of the customer.
        global_id:
          type: string
          nullable: true
          description: Customer's global Facebook ID.
        name:
          type: string
          description: Customer's display name.
        can_inbox:
          type: boolean
          description: Whether the page can currently message the customer.
        is_activated:
          type: boolean
          description: Whether the customer account is activated.
        is_followed:
          type: boolean
          nullable: true
          description: Whether the customer follows the page.
        currency:
          type: string
          description: Currency used for the customer's orders.
        order_count:
          type: integer
          description: Total number of orders placed by the customer.
        succeed_order_count:
          type: integer
          description: Number of successfully completed orders.
        last_order_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the customer's most recent order.
        purchased_amount:
          type: number
          description: Net amount the customer has purchased.
        reward_point:
          type: number
          description: Loyalty/reward points balance.
        level_id:
          type: string
          nullable: true
          description: ID of the customer's membership level.
        level_name:
          type: string
          nullable: true
          description: Name of the customer's membership level.
        color_customer_level:
          type: string
          nullable: true
          description: Display color of the membership level.
        discount:
          type: number
          description: Discount value applied to the customer.
        discount_type:
          type: integer
          description: "Discount type (e.g. percentage vs fixed amount)."
        is_discount_by_level:
          type: boolean
          description: Whether the discount is derived from the membership level.
        max_discount_by_percent:
          type: number
          nullable: true
          description: Maximum percentage discount allowed for the customer.
        total_amount_referred:
          type: number
          nullable: true
          description: Total amount attributed to the customer's referrals.
        emails:
          type: array
          description: Email addresses on file for the customer.
          items:
            type: string
        recent_phone_numbers:
          type: array
          description: Phone numbers recently collected, with the related order.
          items:
            type: object
            properties:
              phone_number:
                type: string
                description: The phone number.
              order_id:
                type: integer
                description: ID of the related order.
        tags:
          type: array
          description: Tags applied to the customer.
          items:
            type: string
        ad_clicks:
          type: array
          description: Ads the customer has clicked.
          items:
            type: object
        address_source:
          type: array
          description: Sources from which the customer's addresses were collected.
          items:
            type: object
        personal_info:
          type: object
          description: Optional personal details about the customer.
          properties:
            job:
              type: string
              nullable: true
              description: Customer's job.
            gender:
              type: string
              nullable: true
              description: Customer's gender.
            lives_in:
              type: string
              nullable: true
              description: Where the customer lives.
            relationship_status:
              type: string
              nullable: true
              description: Customer's relationship status.
            profile_updated_at:
              type: string
              format: date-time
              nullable: true
              description: When the personal info was last updated.
        shop_customer_addresses:
          type: array
          description: Saved shipping addresses for the customer.
          items:
            type: object
            properties:
              id:
                type: string
                description: Address ID.
              full_name:
                type: string
                description: Recipient name.
              phone_number:
                type: string
                nullable: true
                description: Recipient phone number.
              address:
                type: string
                nullable: true
                description: Street/detail part of the address.
              full_address:
                type: string
                description: Fully formatted address.
              province_id:
                type: string
                nullable: true
                description: Province identifier.
              district_id:
                type: string
                nullable: true
                description: District identifier.
              commune_id:
                type: string
                nullable: true
                description: Commune/ward identifier.
              country_code:
                type: integer
                nullable: true
                description: Country calling code.
              post_code:
                type: string
                nullable: true
                description: Postal code.
        web_sources:
          type: array
          description: Web/referrer sources (e.g. m.me links with UTM params) that brought the customer in.
          items:
            type: object
            properties:
              source:
                type: string
                description: The source URL/link.
              params:
                type: array
                description: Parameters parsed from the source (e.g. UTM tags).
                items:
                  type: string
              inserted_at:
                type: string
                format: date-time
                description: When this source was recorded.

    Message:
      type: object
      description: A single message within a conversation (inbox message or comment).
      properties:
        id:
          type: string
          description: Unique ID of the message.
        conversation_id:
          type: string
          description: ID of the conversation this message belongs to.
        page_id:
          type: string
          description: ID of the page the message belongs to.
        type:
          type: string
          description: "Channel of the message (e.g. `INBOX`, `COMMENT`)."
        message:
          type: string
          description: Rendered content of the message (may contain HTML such as `<div></div>` for media-only messages).
        original_message:
          type: string
          description: Raw original text of the message, before rendering.
        from:
          type: object
          description: Information about the message sender.
          properties:
            id:
              type: string
              description: Facebook ID / PSID of the sender.
            name:
              type: string
              description: Sender's display name.
            email:
              type: string
              nullable: true
              description: Sender's email address.
            uid:
              type: string
              nullable: true
              description: Pancake user UUID when sent by a staff member.
            admin_id:
              type: string
              nullable: true
              description: ID of the admin/staff account that sent the message.
            admin_name:
              type: string
              nullable: true
              description: Name of the admin/staff account that sent the message.
            ai_generated:
              type: boolean
              description: Whether the message was generated by AI.
            is_automated:
              type: boolean
              description: Whether the message was sent automatically (e.g. by POS or an automation rule).
        inserted_at:
          type: string
          format: date-time
          description: Timestamp when the message was sent.
        seen:
          type: boolean
          description: Whether the message has been seen.
        has_phone:
          type: boolean
          description: Whether a phone number was detected in the message.
        is_hidden:
          type: boolean
          description: Whether the message (comment) is hidden.
        is_parent_hidden:
          type: boolean
          description: Whether the parent comment is hidden.
        is_removed:
          type: boolean
          description: Whether the message was removed.
        removed_by:
          type: string
          nullable: true
          description: ID of the user who removed the message, if removed.
        is_parent:
          type: boolean
          description: Whether this is a top-level (parent) comment.
        parent_id:
          type: string
          nullable: true
          description: ID of the parent comment, for replies.
        comment_count:
          type: integer
          nullable: true
          description: Number of replies to this comment.
        like_count:
          type: integer
          nullable: true
          description: Number of likes on this comment.
        user_likes:
          type: boolean
          description: Whether the page has liked this comment.
        is_livestream_order:
          type: boolean
          nullable: true
          description: Whether the comment was parsed as a livestream order.
        show_info:
          type: boolean
          description: Whether to display extra info for the message in the UI.
        can_comment:
          type: boolean
          description: Whether the page can comment on this item.
        can_like:
          type: boolean
          description: Whether the page can like this item.
        can_hide:
          type: boolean
          description: Whether the message can be hidden.
        can_remove:
          type: boolean
          description: Whether the message can be removed.
        can_reply_privately:
          type: boolean
          description: Whether the comment can be answered with a private reply.
        private_reply_conversation:
          type: string
          nullable: true
          description: ID of the inbox conversation created from a private reply, if any.
        rich_message:
          type: object
          nullable: true
          description: Extra rich-content metadata for the message (e.g. print status).
          properties:
            is_printed:
              type: boolean
              description: Whether the message has been printed.
        edit_history:
          type: array
          nullable: true
          description: Prior versions of the message, if it was edited.
          items:
            type: object
        message_tags:
          type: array
          description: Entities detected inside the message text (links, mentions, etc.).
          items:
            type: object
            properties:
              type:
                type: string
                description: "Tag type (e.g. `link`)."
              link:
                type: string
                description: The URL, for link tags.
              offset:
                type: integer
                description: Character offset where the entity starts.
              length:
                type: integer
                description: Length of the entity in characters.
        phone_info:
          type: array
          description: Phone numbers detected within this specific message.
          items:
            type: object
        attachments:
          type: array
          description: Media and structured attachments on the message.
          items:
            type: object
            properties:
              type:
                type: string
                description: "Attachment type — one of `photo`, `video`, `sticker`, `template`, `system_message`."
              url:
                type: string
                description: URL of the media (or thumbnail for videos).
              id:
                type: string
                description: Attachment ID, when present.
              title:
                type: string
                nullable: true
                description: Title of the attachment.
              message:
                type: string
                nullable: true
                description: Text body, for `system_message` attachments.
              link:
                type: string
                nullable: true
                description: External link associated with the attachment.
              mime_type:
                type: string
                nullable: true
                description: MIME type of the media (e.g. `video/mp4`).
              video_data:
                type: object
                description: Playable video details, for `video` attachments.
                properties:
                  url:
                    type: string
                    description: Direct URL of the video file.
                  width:
                    type: integer
                    description: Video width in pixels.
                  height:
                    type: integer
                    description: Video height in pixels.
              payload:
                type: object
                description: Structured payload, for `template` attachments.
                properties:
                  template_type:
                    type: string
                    description: "Template type (e.g. `button`)."
                  buttons:
                    type: array
                    description: Buttons rendered with the template.
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          description: "Button type (e.g. `web_url`)."
                        title:
                          type: string
                          description: Button label.
                        url:
                          type: string
                          description: URL the button opens.
                        webview_height_ratio:
                          type: string
                          description: "Webview height when opened (e.g. `full`)."

    PrivateReply:
      title: Private Reply
      type: object
      required: [action, post_id, message_id, message, from_id]
      properties:
        action:
          type: string
          enum: [private_replies]
        post_id:
          type: string
          description: ID of the post containing the comment
        message_id:
          type: string
          description: ID of the comment you want to send message from
        from_id:
          type: string
          description: Unique identifier of the sender (from.id)
        message:
          type: string
          description: Content of the message
        sender_id:
          type: string
          description: >
            Unique identifier of the sender user. You can get this from the [get users list API](https://developer.pancake.biz/#/paths/pages-page_id--users/get) <br>
            **Note**: User must have the required subscription plan and page permissions to perform this action
    InboxMessage:
      title: Inbox Message
      type: object
      required: [action, message]
      properties:
        action:
          type: string
          enum: [reply_inbox]
        message:
          type: string
          description: |
            **Text content of the inbox message**
            
            ⚠️ **MUTUALLY EXCLUSIVE with `content_ids`**: 
            - Use `message` for **text-only** messages
            - Use `content_ids` for **media/template** messages
            - **DO NOT send both** → API returns **500 error**
        content_ids:
          type: array
          description: |
            List of content_ids you want to send. Each `content_id` is generated from [the content upload API](https://developer.pancake.biz/#/paths/pages-page_id--upload_contents/post).

            **Maximum number of `content_ids` per API call (by platform):**

            | Platform | Max `content_ids` per call |
            |---|---|
            | Facebook | 30 |
            | Instagram | 10 |
            | personal_zalo | 30 |
            | Telegram | 10 |
            | Chat plugin | 10 |
            | booking.com | 10 |
            | mercado_libre | 10 |
            | All other platforms | 1 |

            For any platform not listed above, send only **one** `content_id` per call — split additional media into separate API calls.
        filename:
          type: string
          description: Specifies the file name for the document being sent. This parameter is only supported when a attachment type is document. If omitted, the file name defaults to `Document`.
        sender_id:
          type: string
          description: >
            Unique identifier of the sender user. You can get this from the [get users list API](https://developer.pancake.biz/#/paths/pages-page_id--users/get) <br>
            **Note**: User must have the required subscription plan and page permissions to perform this action
        reply_message_id:
          type: string
          description: ID of the message you want to reply to
    ReplyComment:
      title: Reply Comment
      type: object
      required: [action, message_id, message]
      properties:
        action:
          type: string
          enum: [reply_comment]
        message_id:
          type: string
          description: ID of the comment you want to reply to
        message:
          type: string
          description: Content of the reply message
        content_ids:
          type: array
          description: |
            List of content_ids you want to send. Each `content_id` is generated from [the content upload API](https://developer.pancake.biz/#/paths/pages-page_id--upload_contents/post).

            **Maximum number of `content_ids` per API call (by platform):**

            | Platform | Max `content_ids` per call |
            |---|---|
            | Facebook | 30 |
            | Instagram | 10 |
            | personal_zalo | 30 |
            | Telegram | 10 |
            | Chat plugin | 10 |
            | booking.com | 10 |
            | mercado_libre | 10 |
            | All other platforms | 1 |

            For any platform not listed above, send only **one** `content_id` per call — split additional media into separate API calls.
        sender_id:
          type: string
          description: >
            Unique identifier of the sender user. You can get this from the [get users list API](https://developer.pancake.biz/#/paths/pages-page_id--users/get) <br>
            **Note**: User must have the required subscription plan and page permissions to perform this action
        mentions:
          type: array
          items:
            type: object
            properties:
              psid:
                type: string
                description: Customer's PSID
              name:
                type: string
                description: Customer's name
              offset:
                type: integer
              length:
                type: integer

    WhatsappTemplateMessage:
      title: WhatsApp Template Message
      type: object
      required:
        - action
        - template_id
      properties:
        action:
          type: string
          enum:
            - reply_inbox
          description: Must be `reply_inbox` when sending WhatsApp template message
        conversation_id:
          type: string
          description: > 
            **Tip**: In case of sending to a new phone number, you can manually create a conversation_id according to the following structure: [pageID]_[phoneNumber]. `Example: waba_1234567890_821234567890`
        template_id:
          type: string
          description: Approved WhatsApp template ID
        template_params:
          $ref: '#/components/schemas/WhatsappTemplateParams'
        sender_id:
          type: string
          description: >
            Unique identifier of the sender user. You can get this from the [get users list API](https://developer.pancake.biz/#/paths/pages-page_id--users/get) <br>
            **Note**: User must have the required subscription plan and page permissions to perform this action

    WhatsappTemplateParams:
      type: object
      description: >
        Parameters used to replace variables in WhatsApp template components.
        Structure follows Meta WhatsApp template format (Header, Body, Buttons).
      properties:
        HEADER_PARAMS:
          $ref: '#/components/schemas/WhatsappTemplateHeaderParams'
        BODY_PARAMS:
          $ref: '#/components/schemas/WhatsappTemplateBodyParams'
        BUTTONS_[Index]_PARAMS:
          $ref: '#/components/schemas/WhatsappTemplateButtonParams'

    WhatsappTemplateBodyParams:
      type: object
      description: >
        Variables used in template body
        `Example: { "order_id": "A12345", "customer_name": "John Doe", "product_name": "Product Name" }`
      properties:
        type: object

    WhatsappTemplateButtonParams:
      type: object
      description: >
        [Index] is the index of the button
        `Example: { "BUTTONS_0_PARAMS": { "{{order_id}}": "A12345", "{{customer_name}}": "John Doe", "{{product_name}}": "Product Name" } }`
      properties:
        type: object

    WhatsappTemplateHeaderParams:
      oneOf:
        - $ref: '#/components/schemas/WhatsappTemplateHeaderText'
        - $ref: '#/components/schemas/WhatsappTemplateHeaderImage'
        - $ref: '#/components/schemas/WhatsappTemplateHeaderVideo'
        - $ref: '#/components/schemas/WhatsappTemplateHeaderDocument'

    WhatsappTemplateHeaderText:
      type: object
      description: >
        Header parameters when header type is text
        `Example: { "order_id": "A12345" }`
      properties:
        type: object

    WhatsappTemplateHeaderImage:
      type: object
      description: >
        Header parameters when header type is image
        `Example: { "IMAGE": { "url": "https://example.com/image.jpg" } }`
      properties:
        type: object

    WhatsappTemplateHeaderVideo:
      type: object
      description: >
        Header parameters when header type is video
        `Example: { "VIDEO": { "url": "https://example.com/video.mp4" } }`
      properties:
        type: object

    WhatsappTemplateHeaderDocument:
      type: object
      description: >
        Header parameters when header type is document
        `Example: { "DOCUMENT": { "url": "https://example.com/document.pdf", "name": "document.pdf" } }`
      properties:
        type: object
    

    