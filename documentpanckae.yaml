  /pages/{page_id}/statistics/page_customers:
    get:
      servers:
        - url: 'https://pages.fm/api/public_api/v1'
          description: Page's API v1
      tags:
        - Statistics
      summary: New customer
      description: >
        Retrieve statistics for new customers over a specified period of time. 
        You can group data by day (default), hour, or page ID.
      security:
        - PageAccessToken: []
      parameters:
        - name: page_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the page to retrieve customer statistics for.
        - name: group_by
          in: query
          required: false
          schema:
            type: string
            enum: [day, hour, page_id]
            default: day
          description: >
            Grouping method for the data:
            - `day`: Returns data grouped by day (default).
            - `hour`: Returns data grouped by hour.
            - `page_id`: Returns data grouped by page ID.
        - name: page_access_token
          in: query
          required: true
          schema:
            type: string
          description: Access token for the page (retrievable from page settings).
        - name: date_range
          in: query
          required: true
          schema:
            type: string
            example: "20/07/2020 - 20/08/2020"
          description: The date range for which to retrieve statistics.
      responses:
        '200':
          description: Successful response with new customer statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - type: array
                        description: Statistics grouped by day or hour
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                              description: Date or hour of the statistics
                              example: "2020-08-12T16:00:00"
                            new_customer_count:
                              type: integer
                              description: Number of new customers
                              example: 4
                            new_page_inbox_count:
                              type: integer
                              description: Number of new inbox conversations
                              example: 3
                            new_phone_number_count:
                              type: integer
                              description: Number of new phone numbers collected
                              example: 0
                            phone_number_count:
                              type: integer
                              description: Total phone numbers
                              example: 0
                      - type: object
                        description: Statistics grouped by page ID
                        additionalProperties:
                          type: array
                          items:
                            type: object
                            properties:
                              date:
                                type: string
                                description: Date of the statistics
                                example: "2020-08-12"
                              new_customer_count:
                                type: integer
                                example: 0
                              new_page_inbox_count:
                                type: integer
                                example: 1
                              new_phone_number_count:
                                type: integer
                                example: 0
                              phone_number_count:
                                type: integer
                                example: 0
                  success:
                    type: boolean
                    example: true
              
  /pages/{page_id}/export_data:
    get:
      servers:
        - url: 'https://pages.fm/api/public_api/v1'
          description: Page's API v1
      tags:
        - Export Data
      summary: Export conversations from ads
      description: >
        Export conversations coming from ads within a specified time range. 
        Each request returns up to 60 conversations starting from the given offset.
      security:
        - PageAccessToken: []
      parameters:
        - name: page_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the customer page.
        - name: page_access_token
          in: query
          required: true
          schema:
            type: string
          description: Access token of the page (retrievable from page settings).
        - name: since
          in: query
          required: true
          schema:
            type: integer
            format: int64
            example: 1672531200
          description: Start time in UNIX timestamp (UTC+0).
        - name: until
          in: query
          required: true
          schema:
            type: integer
            format: int64
            example: 1675219599
          description: End time in UNIX timestamp (UTC+0).
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum: [conversations_from_ads]
          description: Action type, must be `conversations_from_ads`.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: >
            Offset for pagination. Default is 0. Each call returns up to 60 records.
      responses:
        '200':
          description: Successfully exported conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: List of conversations
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Conversation ID
                        tags:
                          type: array
                          items:
                            type: string
                        from:
                          type: object
                          properties:
                            email:
                              type: string
                              example: "user@example.com"
                            id:
                              type: string
                              description: Facebook user ID
                            name:
                              type: string
                              description: Name of the user
                        inserted_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        customers:
                          type: array
                          items:
                            type: object
                            properties:
                              fb_id:
                                type: string
                              id:
                                type: string
                              name:
                                type: string
                        recent_phone_numbers:
                          type: array
                          items:
                            type: string
                        recent_seen_users:
                          type: array
                          items:
                            type: object
                            properties:
                              fb_id:
                                type: string
                              fb_name:
                                type: string
                              seen_at:
                                type: string
                                format: date-time
                        thread_key:
                          type: string
                        psid:
                          type: string
                        ad_clicks:
                          type: array
                          items:
                            type: string
                        is_banned:
                          type: boolean
                        assignees:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              name:
                                type: string
                  success:
                    type: boolean
                    example: true

  /pages/{page_id}/page_customers:
    get:
      servers:
        - url: 'https://pages.fm/api/public_api/v1'
          description: Page's API v1
      tags:
        - Customers
      summary: Get page customers information
      description: >
        Retrieve customer information for a specific page within a time range. Supports pagination and sorting options.
      security:
        - PageAccessToken: []
      parameters:
        - name: page_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the customer page.
        - name: page_access_token
          in: query
          required: true
          schema:
            type: string
          description: The access token of the page (can be created in the page settings).
        - name: since
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: Start time in UNIX timestamp (UTC+0).
        - name: until
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: End time in UNIX timestamp (UTC+0).
        - name: page_number
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: "Current page number (minimum value: 1)."
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
          description: The size of each page (maximum 100).
        - name: order_by
          in: query
          required: false
          schema:
            type: string
            enum: [inserted_at, updated_at]
            default: inserted_at
          description: "Sort order in descending order. Options: `inserted_at` (creation time), `updated_at` (last updated time)."
      responses:
        '200':
          description: Successfully retrieved customers information
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of customers
                    example: 500
                  customers:
                    type: array
                    description: List of customers
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Page-customer ID (unique within the page).
                        customer_id:
                          type: string
                          description: Global customer ID linking this contact across pages.
                        name:
                          type: string
                          description: Customer's name
                        psid:
                          type: string
                          description: Page-scoped user ID
                        thread_id:
                          type: string
                          nullable: true
                          description: ID of the customer's conversation thread with the page.
                        birthday:
                          type: string
                          format: date
                          nullable: true
                          description: "Customer's birthday as a `YYYY-MM-DD` string (unknown parts are `00`, e.g. `1998-00-00`). `null` if unknown."
                        gender:
                          type: string
                          nullable: true
                          description: Customer's gender
                        lives_in:
                          type: string
                          nullable: true
                          description: Customer's location
                        can_inbox:
                          type: boolean
                          description: Whether the page can currently send the customer an inbox message (inside the messaging window).
                        emails:
                          type: array
                          nullable: true
                          description: Email addresses on file for the customer.
                          items:
                            type: string
                        phone_numbers:
                          type: array
                          items:
                            type: string
                          description: List of phone numbers
                        inserted_at:
                          type: string
                          format: date-time
                          description: Creation time of the customer record
                        updated_at:
                          type: string
                          format: date-time
                          description: Time the customer record was last updated.
                        recent_orders:
                          type: array
                          nullable: true
                          description: Customer's most recent orders. `null` when none are returned.
                          items:
                            type: object
                        notes:
                          type: array
                          description: Customer notes
                          items:
                            type: object
                            properties:
                              created_at:
                                type: integer
                                format: int64
                                description: Creation time in UNIX timestamp (milliseconds)
                              created_by:
                                type: object
                                description: Information about the user who created the note
                                properties:
                                  fb_id:
                                    type: string
                                    description: Facebook ID
                                  fb_name:
                                    type: string
                                    description: Facebook name
                                  uid:
                                    type: string
                                    description: System user ID
                              edit_history:
                                type: array
                                description: History of edits
                                items:
                                  type: object
                              id:
                                type: string
                                description: Note ID
                              images:
                                type: array
                                description: List of images attached to the note
                                items:
                                  type: string
                              links:
                                type: array
                                description: List of links attached to the note
                                items:
                                  type: string
                              message:
                                type: string
                                description: Content of the note
                              order_id:
                                type: string
                                description: Related order ID
                              removed_at:
                                type: integer
                                format: int64
                                nullable: true
                                description: Time the note was removed (if applicable)
                              updated_at:
                                type: integer
                                format: int64
                                nullable: true
                                description: Time the note was last updated (if applicable)
                  success:
                    type: boolean
                    example: true

  /pages/{page_id}/page_customers/{page_customer_id}:
