openapi: 3.0.0
info:
  title: Pancake API Library
  version: 1.0.0
  description: |
    API for retrieving page data, generating access tokens, and listing conversations on Pancake platform.

    ## Authentication

    Pancake APIs use two types of tokens. Both are passed as a **query parameter** in the request URL — there is no `Authorization` header. You only need to learn these two tokens to call any endpoint in this documentation.

    | Token | Query parameter | Used for | Lifespan |
    |---|---|---|---|
    | **User Access Token** | `access_token` | Account-level APIs under `https://pages.fm/api/v1/...` (list pages, generate `page_access_token`) | Up to **90 days**, or until the user logs out |
    | **Page Access Token** | `page_access_token` | All page-level APIs under `https://pages.fm/api/public_api/v1/...` and `https://pages.fm/api/public_api/v2/...` (conversations, messages, statistics, customers, etc.) | **Does not expire** unless manually deleted or regenerated |

    ---

    ### 1. User Access Token (`access_token`)

    The User Access Token uniquely identifies an individual Pancake user account. It is required only for a small number of account-level endpoints — primarily to list the pages you manage and to generate a `page_access_token` for each page.

    **How to get it (manual, from the Pancake UI):**

    1. Log in to Pancake at [https://pages.fm](https://pages.fm).
    2. Go to **Account → Personal Settings**.
    3. Copy the **API Access Token** value shown in the settings panel.

    ![How to get User access token?](https://statics.pancake.vn/pancake-docs/2025/3/20/Screenshot%202025-03-20%20at%2014.20.51.png)

    **When to use it:**
    - [GET /pages — List pages](https://developer.pancake.biz/#/paths/pages/get) — list all pages the user manages.
    - [POST /pages/{page_id}/generate_page_access_token — Generate page_access_token](https://developer.pancake.biz/#/paths/pages-page_id--generate_page_access_token/post) — generate or refresh a `page_access_token` for a specific page (the calling user must be an admin of that page).

    **How to pass it:** append `?access_token=YOUR_USER_ACCESS_TOKEN` to the request URL.

    ```
    GET https://pages.fm/api/v1/pages?access_token=YOUR_USER_ACCESS_TOKEN
    ```

    **Important notes:**
    - Treat this token as a password — it grants access to every page the user manages. Do not commit it to source control or expose it on the client side.
    - The token is invalidated when the user logs out, or after up to 90 days of inactivity. If your calls start returning `401 Unauthorized`, retrieve a new token from the UI.

    ---

    ### 2. Page Access Token (`page_access_token`)

    The Page Access Token authenticates a request **on behalf of a specific page**. The vast majority of endpoints in this documentation require a `page_access_token` — including conversations, messages, statistics, customers, posts, tags, users, call logs, exports, and uploads.

    Each page has its own `page_access_token`. A token is scoped to exactly one page; you cannot use it to access data of another page.

    **How to get it — Option A (UI):**

    1. Open the page in Pancake.
    2. Go to **Settings → Tools** (Cài đặt → Công cụ).
    3. Copy the **Page Access Token** shown there.

    ![How to get Page access token?](https://statics.pancake.vn/pancake-docs/2025/3/20/Screenshot%202025-03-20%20at%2014.30.53.png)

    **How to get it — Option B (API):**

    Call [POST /pages/{page_id}/generate_page_access_token](https://developer.pancake.biz/#/paths/pages-page_id--generate_page_access_token/post) using a User Access Token of an **admin** of that page. The response returns a new `page_access_token` (and invalidates the previous one if it existed).

    ```
    POST https://pages.fm/api/v1/pages/{page_id}/generate_page_access_token?access_token=YOUR_USER_ACCESS_TOKEN
    ```

    **When to use it:** every endpoint marked `PageAccessToken` in this documentation. Examples:
    - `GET /pages/{page_id}/conversations`
    - `GET /pages/{page_id}/conversations/{conversation_id}/messages`
    - `POST /pages/{page_id}/conversations/{conversation_id}/messages`
    - `GET /pages/{page_id}/page_customers`
    - `GET /pages/{page_id}/statistics/...`

    **How to pass it:** append `?page_access_token=YOUR_PAGE_ACCESS_TOKEN` to the request URL.

    ```
    GET https://pages.fm/api/public_api/v2/pages/{page_id}/conversations?page_access_token=YOUR_PAGE_ACCESS_TOKEN
    ```

    **Important notes:**
    - The token does **not** expire. It remains valid until you manually delete it or regenerate a new one (regenerating invalidates the old token).
    - Each page has a separate token. To work with multiple pages, store the `page_access_token` for each `page_id` you manage.
    - Keep the token secret. Anyone with the token can read and modify the page's conversations, customers, and other data.

    ---

    ### Token usage cheat sheet

    - "How do I list my pages?" → use `access_token` against `https://pages.fm/api/v1/pages`.
    - "How do I get conversations / messages / customers / statistics for a page?" → use `page_access_token` for that page against `https://pages.fm/api/public_api/v1` or `/v2`.
    - "Do I need both tokens?" → only if you want to programmatically fetch a `page_access_token` via the Generate page_access_token API. Otherwise you can copy the `page_access_token` directly from **Settings → Tools** and use it alone.
    - "Which endpoints need no token?" → `GET /pages/{page_id}/avatar/{psid}` is the only public endpoint; everything else requires one of the two tokens above.

    ---

    ## Rate Limits

    Public API requests are rate limited to **5 calls per page per second**. The limit is applied per `page_id`, so calls to different pages are counted independently.

    If you exceed the limit, the API returns HTTP `429 Too Many Requests`. When this happens, slow down your request rate (and retry with a short back-off). To stay within the limit, batch or queue your calls and avoid sending more than 5 requests per second to the same page.

    ---

    ## API Usage Flow

    The following is the recommended API usage flow when integrating with the Pancake platform.

    ---

    ### Step 1 — Get Pages

    Start by authenticating your account and retrieving the list of pages (Facebook Page, Zalo OA, etc.) managed by the account.
    The response provides the `page_id` and allows you to generate a `page_access_token` required for all subsequent API calls.

    - [GET /pages — List pages](https://developer.pancake.biz/#/paths/pages/get): Retrieve all pages associated with the authenticated account.
    - [POST /pages/{page_id}/generate_page_access_token — Generate page_access_token](https://developer.pancake.biz/#/paths/pages-page_id--generate_page_access_token/post): Generate or refresh the `page_access_token` used to authenticate page-level APIs.

    ---

    ### Step 2 — Get Page Data (Conversations, Statistics, Export, Posts, Customers)

    Once you have a `page_id` and `page_access_token`, you can retrieve the core data of a page:

    **Conversations**
    - [GET /pages/{page_id}/conversations — Conversations](https://developer.pancake.biz/#/paths/pages-page_id--conversations/get): Retrieve a list of conversations (up to 60 per request, paginated via `last_conversation_id`). Supports filtering by type (INBOX/COMMENT), tags, posts, and time range.
    - [POST /pages/{page_id}/conversations/{conversation_id}/tags — Conversation's tag](https://developer.pancake.biz/#/paths/pages-page_id--conversations--conversation_id--tags/post): Add or remove a tag from a specific conversation.
    - [POST /pages/{page_id}/conversations/{conversation_id}/assign — Assign conversation](https://developer.pancake.biz/#/paths/pages-page_id--conversations--conversation_id--assign/post): Assign one or more staff members to a specific conversation.
    - [POST /pages/{page_id}/conversations/{conversation_id}/read — Mark as read](https://developer.pancake.biz/#/paths/pages-page_id--conversations--conversation_id--read/post): Mark a conversation as read.
    - [POST /pages/{page_id}/conversations/{conversation_id}/unread — Mark as unread](https://developer.pancake.biz/#/paths/pages-page_id--conversations--conversation_id--unread/post): Mark a conversation as unread.

    **Statistics**
    - [GET /pages/{page_id}/statistics/pages_campaigns — Ads campaign](https://developer.pancake.biz/#/paths/pages-page_id--statistics-pages_campaigns/get): Retrieve advertising campaign statistics.
    - [GET /pages/{page_id}/statistics/ads — Ads](https://developer.pancake.biz/#/paths/pages-page_id--statistics-ads/get): Retrieve detailed ad-level statistics.
    - [GET /pages/{page_id}/statistics/customer_engagements — Engagement](https://developer.pancake.biz/#/paths/pages-page_id--statistics-customer_engagements/get): Retrieve customer engagement statistics.
    - [GET /pages/{page_id}/statistics/pages — Page](https://developer.pancake.biz/#/paths/pages-page_id--statistics-pages/get): Retrieve page performance statistics.
    - [GET /pages/{page_id}/statistics/tags — Tag](https://developer.pancake.biz/#/paths/pages-page_id--statistics-tags/get): Retrieve statistics broken down by tags.
    - [GET /pages/{page_id}/statistics/users — User](https://developer.pancake.biz/#/paths/pages-page_id--statistics-users/get): Retrieve staff performance statistics.

    **Export**
    - [GET /pages/{page_id}/export_data — Export conversations from ads](https://developer.pancake.biz/#/paths/pages-page_id--export_data/get): Export conversation data originating from ads.

    **Posts**
    - [GET /pages/{page_id}/posts — Get posts](https://developer.pancake.biz/#/paths/pages-page_id--posts/get): Retrieve the list of posts for the page, useful for filtering conversations by a specific post.

    **Tags**
    - [GET /pages/{page_id}/tags — Get list tags](https://developer.pancake.biz/#/paths/pages-page_id--tags/get): Retrieve the list of tags configured for the page.

    **Users**
    - [GET /pages/{page_id}/users — Get list of users](https://developer.pancake.biz/#/paths/pages-page_id--users/get): Retrieve the list of staff users for the page, including their availability status and round robin settings.
    - [POST /pages/{page_id}/round_robin_users — Update round robin users](https://developer.pancake.biz/#/paths/pages-page_id--round_robin_users/post): Update the list of users assigned to the round robin system for message and comment handling.

    **Call Logs**
    - [GET /pages/{page_id}/sip_call_logs — Retrieve call logs](https://developer.pancake.biz/#/paths/pages-page_id--sip_call_logs/get): Retrieve the call history for a specific page.

    **Page Customers**
    - [GET /pages/{page_id}/page_customers — Get page customers information](https://developer.pancake.biz/#/paths/pages-page_id--page_customers/get): Retrieve customer profiles for the page, supporting lookup and customer management.
    - [PUT /pages/{page_id}/page_customers/{page_customer_id} — Update page customer information](https://developer.pancake.biz/#/paths/pages-page_id--page_customers--page_customer_id/put): Update customer profiles for the page.
    - [POST /pages/{page_id}/page_customers/{page_customer_id}/notes — Create page customer note](https://developer.pancake.biz/#/paths/pages-page_id--page_customers--page_customer_id--notes/post): Create a note for a customer.
    - [PUT /pages/{page_id}/page_customers/{page_customer_id}/notes — Update page customer note](https://developer.pancake.biz/#/paths/pages-page_id--page_customers--page_customer_id--notes/put): Update a note for a customer.
    - [DELETE /pages/{page_id}/page_customers/{page_customer_id}/notes — Delete page customer note](https://developer.pancake.biz/#/paths/pages-page_id--page_customers--page_customer_id--notes/delete): Delete a note for a customer.
    - [GET /pages/{page_id}/avatar/{psid} — Get customer avatar](https://developer.pancake.biz/#/paths/pages-page_id--avatar--psid/get): Get the avatar image URL of a customer by `page_id` and `psid` (no authentication required).

    ---

    ### Step 3 — Get Messages

    Once you have identified the target conversation, retrieve the full message history within it.

    - [GET /pages/{page_id}/conversations/{conversation_id}/messages — Get messages](https://developer.pancake.biz/#/paths/pages-page_id--conversations--conversation_id--messages/get): Retrieve all messages in a specific conversation.
    - [POST /pages/{page_id}/conversations/{conversation_id}/messages — Send message](https://developer.pancake.biz/#/paths/pages-page_id--conversations--conversation_id--messages/post): Send a message to a specific conversation.

    ---

    ### Step 4 — Media & Chat Plugin

    **Upload Media**
    - [POST /pages/{page_id}/upload_contents — Upload media content](https://developer.pancake.biz/#/paths/pages-page_id--upload_contents/post): Upload a file (image, video, document) to a page to obtain an attachment ID for use in messages.

    **Chat Plugin**
    - [POST /pke_chat_plugin/messages — Send message via Chat Plugin](https://developer.pancake.biz/#/paths/pke_chat_plugin-messages/post): Send a message or create a new conversation to a customer through Pancake Chat Plugin.
    - [GET /pke_chat_plugin/messages — Get messages](https://developer.pancake.biz/#/paths/pke_chat_plugin-messages/get): Retrieve message history of a specific conversation in Pancake Chat Plugin. Supports pagination via offset.

  contact:
    name: Pancake Support
    url: 'https://www.pancake.biz/contact'

servers:
  - url: 'https://pages.fm/api/v1'
    description: User's API
  - url: 'https://pages.fm/api/public_api/v1'
    description: Page's API v1
  - url: 'https://pages.fm/api/public_api/v2'
    description: Page's API v2

tags:
  - name: Pages
    description: Page management and access tokens
  - name: Conversations
    description: Customer conversations
  - name: Messages
    description: Operations related to chat messages
  - name: Statistics
    description: Advertising campaign and ad report statistics APIs
  - name: Statistics - User
    description: APIs related to user (staff) performance statistics across single or multiple pages

paths:
  /pages:
    get:
      servers:
        - url: 'https://pages.fm/api/v1'
          description: User's API (default for list pages)
      tags:
        - Pages
      summary: List pages
      description: Get list pages for the authenticated account
      security:
        - UserAccessToken: []
      parameters:
        - name: access_token
          in: query
          required: true
          schema:
            type: string
          description: Pancake user access token for authentication.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  pages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Page'

  /pages/{page_id}/generate_page_access_token:
    post:
      servers:
        - url: 'https://pages.fm/api/v1'
          description: User's API (default for list pages)
      tags:
        - Pages
      summary: Generate page_access_token
      description: "Generate or refresh page_access_token by the admin's access_token of page. Page Access Token used to authenticate public APIs on behalf of a Page. The page's admin can retrieve this token from the Pancake interface by going to: Page's settings → Tools. This token does not expire unless it is manually deleted or renewed. An API key is a token that you provide when making API calls. Include the token in a query parameter called page_access_token."
      security:
        - UserAccessToken: []
      parameters:
        - name: page_id
          in: query
          required: true
          schema:
            type: string
          description: ID of the customer's page.
        - name: access_token
          in: query
          required: true
          schema:
            type: string
          description: Pancake user access token with admin rights to the page.
      responses:
        '200':
          description: Token generated successfully

  /pages/{page_id}/conversations:
    get:
      servers:
        - url: 'https://pages.fm/api/public_api/v2'
          description: Page's API v2
      tags:
        - Conversations
      summary: Conversations
      description: Get a list of the latest 60 conversations. Put the `last_conversation_id` parameter to get more conversations.
      security:
        - PageAccessToken: []
      parameters:
        - name: page_access_token
          in: query
          required: true
          schema:
            type: string
          description: Access token of the page for authentication.
        - name: page_id
          in: path
          required: true
          schema:
            type: string
          description: Unique ID of the customer's page.
        - name: last_conversation_id
          in: query
          required: false
          schema:
            type: string
          description: "The `last_conversation_id` parameter represents the ID of a conversation. If this parameter is not provided, the system returns the 60 most recently updated conversations. If you provide the ID of the last conversation from the previous call, the system returns the next 60 older conversations."
        - name: tags
          in: query
          required: false
          schema:
            type: string
          description: Filter conversations by tag IDs (comma-separated).
        - name: type
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by conversation types (e.g. INBOX, COMMENT, COMMENT_LIVESTREAM, POST).
        - name: post_ids
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by post IDs (for comment-based conversations). Required to include `type:POST`
        - name: since
          in: query
          required: false
          schema:
            type: integer
          description: Filter from a specific timestamp (in seconds).
        - name: until
          in: query
          required: false
          schema:
            type: integer
          description: Filter up to a specific timestamp (in seconds).
        - name: unread_first
          in: query
          required: false
          schema:
            type: boolean
          description: Prioritize unread conversations.
        - name: order_by
          in: query
          required: false
          schema:
            type: string
            enum: [inserted_at, updated_at]
          description: Sort by insertion or update time.
      responses:
        '200':
          description: List of conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Conversation'

  /pages/{page_id}/conversations/{conversation_id}/tags:
    post:
      servers:
        - url: 'https://pages.fm/api/public_api/v1'
          description: Page's API v1
      tags:
        - Conversations
      summary: Conversation's tag
      description: Add or remove a tag from a conversation
      security:
        - PageAccessToken: []
      parameters:
        - name: page_id
          in: path
          required: true
          schema:
            type: string
          description: Unique ID of the customer's page.
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
          description: Unique ID of the conversation to be updated.
        - name: page_access_token
          in: query
          required: true
          schema:
            type: string
          description: Access token of the page used for authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action
                - tag_id
              properties:
                action:
                  type: string
                  enum: [add, remove]
                  description: Action to perform (add or remove tag)
                tag_id:
                  type: string
                  description: "ID of the tag to be added or removed. Retrieve the available tag IDs from the [Get list tags API](https://developer.pancake.biz/#/paths/pages-page_id--tags/get)."
      responses:
        '200':
          description: Tags updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: integer
                    description: List of tag IDs after update
                  success:
                    type: boolean
                  timestamp:
                    type: integer
                    description: Operation timestamp
  # Assign staff to a conversation
  /pages/{page_id}/conversations/{conversation_id}/assign:
    post:
      servers:
        - url: 'https://pages.fm/api/public_api/v1'
          description: Page's API v1
      tags:
        - Conversations
      summary: Assign conversation
      description: Assign one or more staff members to a specific conversation
      security:
        - PageAccessToken: []
      parameters:
        - name: page_id
          in: path
          required: true
          schema:
            type: string
          description: Unique ID of the customer's page.
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
          description: Unique ID of the conversation to assign staff to.
        - name: page_access_token
          in: query
          required: true
          schema:
            type: string
          description: Access token of the page used for authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - assignee_ids
              properties:
                assignee_ids:
                  type: array
                  description: List of user IDs to assign to the conversation
                  items:
                    type: string
      responses:
        '200':
          description: Conversation assigned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  assignee_group_id:
                    type: string
                  assignee_ids:
                    type: array
                    items:
                      type: string
                  customers:
                    type: array
                    items:
                      type: object
                      properties:
                        fb_id:
                          type: string
                        id:
                          type: string
                        name:
                          type: string
                  from:
                    type: object
                    properties:
                      email:
                        type: string
                      id:
                        type: string
                      name:
                        type: string
                  seen:
                    type: boolean
                  updated_at:
                    type: string
                    format: date-time

  # Mark a conversation as read
  /pages/{page_id}/conversations/{conversation_id}/read:
    post:
      servers:
        - url: 'https://pages.fm/api/public_api/v1'
          description: Page's API v1
      tags:
        - Conversations
      summary: Mark conversation as read
      description: Mark a conversation as read
      security:
        - PageAccessToken: []
      parameters:
        - name: page_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the customer's page
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the conversation
        - name: page_access_token
          in: query
          required: true
          schema:
            type: string
          description: Page access token
      responses:
        '200':
          description: Success response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  # Mark a conversation as unread
  /pages/{page_id}/conversations/{conversation_id}/unread:
    post:
      servers:
        - url: 'https://pages.fm/api/public_api/v1'
          description: Page's API v1
      tags:
        - Conversations
      summary: Mark conversation as unread
      description: Mark a conversation as unread
      security:
        - PageAccessToken: []
      parameters:
        - name: page_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the customer's page
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the conversation
        - name: page_access_token
          in: query
          required: true
          schema:
            type: string
          description: Page access token
      responses:
        '200':
          description: Success response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  # Retrieve message history from a conversation
  /pages/{page_id}/conversations/{conversation_id}/messages:
    get:
      servers:
        - url: 'https://pages.fm/api/public_api/v1'
          description: Page's API v1
      tags:
        - Messages
      summary: Get messages
      description: Retrieve the list of messages in a conversation. Put the `current_count` parameter to get more messages.
      security:
        - PageAccessToken: []
      parameters:
        - name: current_count
          in: query
          required: false
          schema:
            type: number
          description: Index position to retrieve messages from. Returns 30 messages prior to this index.
        - name: page_access_token
          in: query
          required: true
          schema:
            type: string
          description: Page access token
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the conversation to get messages from
        - name: page_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the page to retrieve data from
      responses:
        '200':
          description: List of messages together with the full customer and conversation context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesResponse'

    post:
      servers:
        - url: 'https://pages.fm/api/public_api/v1'
          description: Page's API v1
      tags:
        - Messages
      summary: Send a message (private reply, inbox, comment reply or whatsapp template message)
      description: >
        Send different types of messages to customers:

        - **Inbox Message**: Send normal inbox message. Use **either** `message` **OR** `content_ids` (mutually exclusive).
        
        - **Reply Comment**: reply to a customer's comment        

        - **Private Reply**: send a private reply from a customer's comment (only apply for some platforms like Facebook, Instagram). 

        - **Whatsapp Template Message**: send a whatsapp template message. (only apply for whatsapp business)

        ⚠️ **IMPORTANT**: `message` and `content_ids` are **MUTUALLY EXCLUSIVE**. Do **NOT** send both simultaneously or API returns error.
      security:
        - PageAccessToken: []
      parameters:
        - name: page_id
          in: path
          required: true
          schema:
            type: string
          description: ID of your page. You can take it from [the get list pages API](https://developer.pancake.biz/#/paths/pages/get)
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the conversation. You can take it from [the get conversations API](https://developer.pancake.biz/#/paths/pages-page_id--conversations/get)
        - name: page_access_token
          in: query
          required: true
          schema:
            type: string
          description: Page access token (generate in tool settings)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/InboxMessage'
                - $ref: '#/components/schemas/ReplyComment'
                - $ref: '#/components/schemas/PrivateReply'
                - $ref: '#/components/schemas/WhatsappTemplateMessage'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  id:
                    type: string
                  message:
                    type: string


