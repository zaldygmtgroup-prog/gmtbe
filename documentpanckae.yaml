  /pages/{page_id}/avatar/{psid}:
    get:
      servers:
        - url: 'https://pages.fm/api/v1'
          description: User's API
      tags:
        - Customers
      summary: Get customer avatar
      description: >
        Retrieve the avatar image of a customer by `page_id` and `psid`.
        This endpoint is public and does not require authentication.
        It responds with a `301 Moved Permanently` redirect to the actual
        avatar image hosted on Pancake's CDN, so it can be used directly as
        the `src` of an `<img>` tag.


        **Example URL:** `https://pancake.vn/api/v1/pages/256469571178082/avatar/1494977527279229`
      parameters:
        - name: page_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the page that the customer belongs to.
          example: "256469571178082"
        - name: psid
          in: path
          required: true
          schema:
            type: string
          description: >
            The customer's `psid` (page-scoped ID). It can be retrieved from:

            - [GET /pages/{page_id}/page_customers — Get page customers](https://developer.pancake.biz/#/paths/pages-page_id--page_customers/get): the `psid` field on each customer.

            - [GET /pages/{page_id}/conversations — Get conversations](https://developer.pancake.biz/#/paths/pages-page_id--conversations/get): the `from.id` field of each conversation.
          example: "1494977527279229"
      responses:
        '301':
          description: Redirect to the actual avatar image URL on Pancake's CDN.
          headers:
            Location:
              schema:
                type: string
                format: uri
                example: "https://content.pancake.vn/2.1-24/avatars/aba903211178ae550e4651c4daef12ae01397de8"
              description: URL of the customer's avatar image.

